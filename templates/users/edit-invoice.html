<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Essential - Edit Invoice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/media/app logo.png"/>
    <link rel="stylesheet" href="/static/css/edit-invoice.css">
</head>
<body data-theme={{ theme }}>
    <div class="particles" id="particles"></div>
    
    <header class="dashboard-header">
        <button class="icon-btn" id="backButton" aria-label="Back">
            <svg viewBox="0 0 24 24">
                <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <h2>Edit Invoice</h2>

        <button class="icon-btn" id="helpBtn" aria-label="Help">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="12" y1="17" x2="12.01" y2="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
    </header>

    <div class="dashboard">
        <main class="content">
            <div class="edit-header">
                <h1>Edit Invoice</h1>
                <p>Update your invoice details and save changes</p>
            </div>
            
            <form id="invoiceForm">
                <input type="hidden" name="invoice_id" id="invoiceId" value="{{ invoiceId }}">
                
                <div class="form-group">
                    <label for="invoice_number">
                        <svg viewBox="0 0 24 24">
                            <line x1="12" y1="5" x2="12" y2="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="5" y1="12" x2="19" y2="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Invoice Number
                    </label>
                    <input type="text" name="invoice_number" id="invoice_number" value="{{ invoiceNumber }}" readonly>
                </div>

                <div class="form-group">
                    <label for="client_name">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Client Name
                    </label>
                    <input type="text" name="client_name" id="client_name" value="{{ clientName }}" required>
                </div>

                <div class="form-group">
                    <label for="client_email">
                        <svg viewBox="0 0 24 24">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <polyline points="22 6 12 13 2 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Client Email
                    </label>
                    <input type="email" name="client_email" id="client_email" value="{{ clientEmail }}" required>
                </div>

                <div class="form-group">
                    <label for="invoice_date">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="16" y1="2" x2="16" y2="6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="8" y1="2" x2="8" y2="6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="3" y1="10" x2="21" y2="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Invoice Date
                    </label>
                    <input type="date" name="invoice_date" id="invoice_date" value="{{ invoiceDate }}" required>
                </div>

                <div class="form-group">
                    <label for="due_date">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="16" y1="2" x2="16" y2="6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="8" y1="2" x2="8" y2="6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="3" y1="10" x2="21" y2="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Due Date
                    </label>
                    <input type="date" name="due_date" id="due_date" value="{{ dueDate }}" required>
                </div>

                <div class="form-group">
                    <label for="currency">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                            <path d="M12 16v-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M12 8h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Currency
                    </label>
                    <select name="currency" id="currency">
                        <option value="USD" selected>$ USD</option>
                        <option value="NGN">₦ NGN</option>
                        <option value="EUR">€ EUR</option>
                        <option value="GBP">£ GBP</option>
                    </select>
                </div>

                <div class="items-section">
                    <h3>
                        <svg viewBox="0 0 24 24">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <polyline points="14 2 14 8 20 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="16" y1="13" x2="8" y2="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="16" y1="17" x2="8" y2="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <polyline points="10 9 9 9 8 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Invoice Items
                    </h3>

                    <div id="items-container">
                        {% for item in items %}
                        <div class="item-row">
                            <input type="text" name="item_desc[]" placeholder="Item description" required value="{{ item.desc }}">
                            <input type="number" name="item_qty[]" placeholder="Qty" min="1" required value="{{ item.qty }}">
                            <input type="number" name="item_price[]" placeholder="Price" min="0" step="0.01" required value="{{ item.price }}">
                            <button type="button" class="remove-item-btn">
                                <svg viewBox="0 0 24 24">
                                    <line x1="18" y1="6" x2="6" y2="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                    <line x1="6" y1="6" x2="18" y2="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </button>
                        </div>
                        {% endfor %}
                 
                    </div>

                    <button type="button" id="add-item-btn">
                        <svg viewBox="0 0 24 24">
                            <line x1="12" y1="5" x2="12" y2="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="5" y1="12" x2="19" y2="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Add Item
                    </button>
                </div>

                <div class="invoice-summary">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">$1,250.00</span>
                    </div>

                    <div class="summary-row">
                        <span>Tax (%)</span>
                        <input type="number" id="tax" name="tax" min="0" value="{{ tax }}" step="0.01">
                    </div>

                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="total">$1,312.50</span>
                    </div>
                </div>

                <!-- Payments -->
                <div class="invoice-summary">
                    <div class="summary-row">
                        <span>Amount Paid</span>
                        <input type="number" id="amount_paid" name="amount_paid" min="0" step="0.01" value="{{ amountPaid }}">
                    </div>

                    <div class="summary-row balance">
                        <span>Balance</span>
                        <span id="balance">${{ balance }}  </span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="notes">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                            <line x1="12" y1="16" x2="12" y2="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="12" y1="8" x2="12.01" y2="8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Notes
                    </label>
                    <textarea name="notes" id="notes" placeholder="Optional notes...">{{ note }}</textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn primary" id="saveInvoiceBtn">
                        <svg viewBox="0 0 24 24">
                            <polyline points="20 6 9 17 4 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Save Invoice
                    </button>
                    <button type="button" class="btn secondary" id="saveDraftBtn">
                        <svg viewBox="0 0 24 24">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <polyline points="17 21 17 13 7 13 7 21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <polyline points="7 3 7 8 15 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Save as Draft
                    </button>
                    <button type="button" class="btn danger" id="deleteDraftBtn">
                        <svg viewBox="0 0 24 24">
                            <polyline points="3 6 5 6 21 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Delete Invoice
                    </button>
                </div>
            </form>
        </main>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="confirm-modal">
        <div class="confirm-content">
            <h3>Delete Invoice?</h3>
            <p>Are you sure you want to delete this invoice? This action cannot be undone.</p>
            <div class="confirm-buttons">
                <button class="btn secondary" id="cancelDelete">Cancel</button>
                <button class="btn danger" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <script src="/static/js/edit-invoice.js"></script>
</body>
</html>
