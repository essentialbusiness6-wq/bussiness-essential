<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Business Essential - Notifications</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/media/app logo.png"/>
    <link rel="stylesheet" href="/static/css/notifications.css">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <header class="dashboard-header">
        <button class="icon-btn" id="backButton" aria-label="Back">
            <svg viewBox="0 0 24 24">
                <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <h2>Notifications</h2>

        <button class="icon-btn" id="optionsButton" aria-label="Options">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="2" fill="currentColor"/>
                <circle cx="12" cy="6" r="2" fill="currentColor"/>
                <circle cx="12" cy="18" r="2" fill="currentColor"/>
            </svg>
        </button>
    </header>

    <main class="content">
        <!-- Header Stats -->
        <div class="notifications-header">
            <div class="stats-bar">
                <span class="stat-item">
                    <span class="stat-number" id="unreadCount">3</span>
                    <span class="stat-label">Unread</span>
                </span>
                <span class="stat-divider"></span>
                <span class="stat-item">
                    <span class="stat-number" id="totalCount">8</span>
                    <span class="stat-label">Total</span>
                </span>
            </div>
            
            <div class="notification-actions">
                <button class="btn mark-all-btn" id="markAllRead">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 6 9 17l-5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Mark All Read</span>
                </button>
                <button class="btn clear-btn" id="clearAll">
                    <svg viewBox="0 0 24 24">
                        <polyline points="3 6 5 6 21 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Clear All</span>
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
            <div class="filter-group">
                <label>Type</label>
                <select id="typeFilter">
                    <option value="all">All Types</option>
                    <option value="payment">Payments</option>
                    <option value="invoice">Invoices</option>
                    <option value="client">Clients</option>
                    <option value="system">System</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Status</label>
                <select id="statusFilter">
                    <option value="all">All Status</option>
                    <option value="unread">Unread Only</option>
                    <option value="read">Read Only</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Date</label>
                <div class="date-selectors">
                    <select id="month-select">
                        <option value="all">All Months</option>
                        <option value="1">January</option>
                        <option value="2">February</option>
                        <option value="3">March</option>
                        <option value="4">April</option>
                        <option value="5">May</option>
                        <option value="6">June</option>
                        <option value="7">July</option>
                        <option value="8">August</option>
                        <option value="9">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                    <select id="year-select">
                        <option value="all">All Years</option>
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Notifications List -->
        <div class="notification-list" id="notifications">
 
            
     
            
      
            

            
          
               
           
          
                       


        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <svg viewBox="0 0 24 24">
                <path d="M18 8a6 6 0 0 0-12 0v7a4 4 0 0 0 8 0v-1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M14 16a2 2 0 0 1-4 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M2 15a10 10 0 0 0 20 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <h3>No notifications yet</h3>
            <p>When you receive notifications, they'll appear here</p>
            <button class="btn primary" id="createFirstNotification">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="5" y1="12" x2="19" y2="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Create First Invoice
            </button>
        </div>
    </main>

    <!-- Options Dropdown -->
    <div class="options-dropdown" id="optionsDropdown">
        <button class="dropdown-item" id="exportNotifications">
            <svg viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <polyline points="17 8 12 3 7 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="12" y1="3" x2="12" y2="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Export Notifications
        </button>
        <button class="dropdown-item" id="notificationSettings">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
            Notification Settings
        </button>
        <button class="dropdown-item danger" id="deleteAll">
            <svg viewBox="0 0 24 24">
                <polyline points="3 6 5 6 21 6" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
            Delete All Notifications
        </button>
    </div>
    
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/js/notifications.js"></script>
</body>
</html>
