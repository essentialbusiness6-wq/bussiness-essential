<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Business Essentials Prime - Professional invoicing, client management, and payment tracking for modern businesses, accept online payments and grow your business.">
    <meta name="keywords" content="Inoice software, invoicing, Business Essentials, Business Essentials Prime, business management, payment tracking, online invoice generator, Nigeria invoice software">
    <meta property="og:title" content="Business Essentials Prime">
    <meta property="og:description" content="Create invoices, manage clients and receive payments online.">
    <meta property="og:image" content="/static/media/app logo.png">
    <meta property="og:url" content="https://businessessentia.net">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Business Essentials Prime">
    <meta name="twitter:description"content="Business management made easy.">
    <meta name="twitter:image" content="/static/media/app logo.png">
    <title>Invoices - Business Essentials Prime | Online Invoice & Business Management Software</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/media/app logo.png"/>
    <link rel="stylesheet" href="/static/css/invoice-list.css">
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-C3FW04E7GT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-C3FW04E7GT');
    </script>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <header class="dashboard-header">
        <button class="icon-btn" id="backBtn" aria-label="Back">
            <svg viewBox="0 0 24 24">
                <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <h2>Your Invoices</h2>

        <button class="icon-btn" id="helpBtn" aria-label="Help">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="12" y1="17" x2="12.01" y2="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
    </header>

    <div class="dashboard">
        <main class="content">
            <div class="top-actions">
                <button class="btn primary" id="createInvoiceBtn">
                    <svg viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="5" y1="12" x2="19" y2="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Create Invoice
                </button>
            </div>
            
            <div class="invoice-filters">
                <button class="filter active" data-status="all">All</button>
                <button class="filter" data-status="pending">Pending</button>
                <button class="filter" data-status="paid">Paid</button>
                <button class="filter" data-status="unpaid">Unpaid</button>
                <button class="filter" data-status="overdue">Overdue</button>
            </div>
               
            <div class="invoices-grid" id="invoicesGrid">
                <!-- Invoices will be populated by JavaScript -->
            </div>
        </main>
        
        <nav class="bottom-nav">
            <a href="/dashboard" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Home</span>
            </a>
            <a href="/dashboard/invoices/list" class="nav-item active">
                <svg viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <polyline points="14 2 14 8 20 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="16" y1="13" x2="8" y2="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="16" y1="17" x2="8" y2="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <polyline points="10 9 9 9 8 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Invoices</span>
            </a>
            <a href="/invoice/drafts/list" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="9" y1="9" x2="15" y2="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="15" y1="9" x2="9" y2="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Drafts</span>
            </a>
            <a href="/dashboard/clients" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="9" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Clients</span>
            </a>
            <a href="/dashboard/payment" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <rect x="2" y="4" width="20" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="6" y1="8" x2="18" y2="8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="6" y1="12" x2="18" y2="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="6" y1="16" x2="14" y2="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Payments</span>
            </a>
            <a href="/dashboard/me" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Me</span>
            </a>
        </nav>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <div class="close" id="closeModal">&times;</div>
            <div class="modal-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" fill="currentColor"/>
                    <path d="M12 16v-4" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="12" cy="8" r="0.5" fill="white"/>
                </svg>
            </div>
            <h2 id="modalTitle">Notification</h2>
            <p id="modalMessage">This is a modal message.</p>
            <button class="modal-btn" id="modalActionBtn">OK</button>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-card">
            <div class="close" id="closeDeleteModal">&times;</div>
            <div class="modal-icon error">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" fill="currentColor"/>
                    <line x1="15" y1="9" x2="9" y2="15" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="9" y1="9" x2="15" y2="15" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h2>Delete Invoice?</h2>
            <p>Are you sure you want to delete this invoice? This action cannot be undone.</p>
            <div class="modal-buttons">
                <button class="modal-btn secondary" id="cancelDelete">Cancel</button>
                <button class="modal-btn" id="confirmDelete">Delete Invoice</button>
            </div>
        </div>
    </div>

    <script src="/static/js/invoice-list.js"></script>
</body>
</html>
